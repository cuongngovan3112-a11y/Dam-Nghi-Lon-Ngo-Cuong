<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Think Big OS — Dám Nghĩ Lớn</title>
<!--
  Nguồn: "Dám Nghĩ Lớn / The Magic of Thinking Big" — David J. Schwartz
  Thiết kế: Ngô Cương Think Big Identity Operating System
  Phiên bản: ULTRA-ELITE v4 | 2026-04-07
-->
<style>
:root{--bg:#06060b;--s1:#0e0e18;--s2:#151522;--s3:#1c1c2e;--c1:#6c5ce7;--c2:#a29bfe;--c3:#fd79a8;--c4:#fdcb6e;--c5:#00b894;--c6:#74b9ff;--c7:#e17055;--tx:#eeeef5;--tx2:#9595ad;--tx3:#5a5a72;--r:14px;--sh:0 4px 24px #0005;--gd:linear-gradient(135deg,#6c5ce7,#a29bfe,#fd79a8);--gd2:linear-gradient(135deg,#00b894,#74b9ff);--f:'Segoe UI',system-ui,sans-serif;--nav-w:220px}
[data-t=l]{--bg:#f0eeff;--s1:#e8e4fc;--s2:#ddd8f8;--s3:#fff;--tx:#111128;--tx2:#4a4a6a;--tx3:#8888a0;--sh:0 4px 24px #6c5ce715}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;height:100%}
body{font-family:var(--f);background:var(--bg);color:var(--tx);line-height:1.65;min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--c1);border-radius:3px}
.hide{display:none!important}

/* ===== LAYOUT: MOBILE (bottom nav) ===== */
#app{max-width:600px;margin:0 auto;padding:12px 16px 100px;min-height:100vh}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid #6c5ce722;z-index:99;backdrop-filter:blur(16px);padding-bottom:env(safe-area-inset-bottom,0px)}
nav>div{max-width:600px;margin:0 auto;display:flex}
nav button{flex:1;background:none;border:none;color:var(--tx3);font-size:9px;padding:8px 2px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.2s;min-height:52px}
nav button.on{color:var(--c1)}nav button:hover{color:var(--c2)}
nav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tgl{position:fixed;top:12px;right:12px;z-index:100;background:var(--s2);border:1px solid #6c5ce722;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:.2s}
.tgl:hover{background:var(--c1)}

/* ===== LAYOUT: DESKTOP (side nav) ===== */
@media(min-width:768px){
  body{display:flex}
  nav{position:fixed;top:0;left:0;bottom:0;right:auto;width:var(--nav-w);border-top:none;border-right:1px solid #6c5ce722;padding-bottom:0;overflow-y:auto}
  nav>div{flex-direction:column;max-width:none;height:100%;padding:16px 0 20px}
  nav button{flex:none;flex-direction:row;font-size:13px;padding:11px 18px;justify-content:flex-start;gap:12px;text-align:left;border-radius:10px;margin:1px 8px;min-height:auto}
  nav svg{width:20px;height:20px;flex-shrink:0}
  nav button.on{background:var(--c1)22;color:var(--c1)}
  #app{margin-left:var(--nav-w);margin-right:auto;max-width:760px;padding:20px 28px 40px;width:calc(100% - var(--nav-w))}
  .tgl{top:14px;right:20px}
  /* Nav brand */
  #nav::before{content:'⚡ THINK BIG OS';display:block;font-size:13px;font-weight:800;background:var(--gd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:8px 20px 16px;letter-spacing:.5px;border-bottom:1px solid #6c5ce722;margin-bottom:8px}
  /* Wider cards on desktop */
  .scroll-x>div{min-width:320px}
  .grid2{grid-template-columns:repeat(3,1fr)}
  .fc{height:240px}
  .day-grid{gap:6px}
  .day-cell{font-size:13px}
  .stat>div{padding:14px 10px}
  .stat span{font-size:26px}
}
@media(min-width:1100px){
  :root{--nav-w:240px}
  #app{max-width:860px}
}

/* COMMON */
.hdr{text-align:center;padding:20px 0 14px}
.hdr h1{font-size:24px;font-weight:800;background:var(--gd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.3px}
.hdr p{color:var(--tx2);font-size:12px;margin-top:4px}
.card{background:var(--s2);border-radius:var(--r);padding:16px;margin:10px 0;border:1px solid #6c5ce712;transition:.2s}
.card:hover{border-color:#6c5ce733}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.btn-p{background:var(--gd);color:#fff}.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-s{background:var(--s3);color:var(--tx);border:1px solid #6c5ce733}.btn-s:hover{border-color:var(--c1)}
.btn-g{background:var(--gd2);color:#fff}.btn-g:hover{opacity:.9}
.btn-d{background:var(--c7);color:#fff}.btn-d:hover{opacity:.85}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.badge{background:var(--c4);color:#000;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:800}
.pbar{height:6px;background:var(--s1);border-radius:3px;overflow:hidden;margin:8px 0}
.pbar>div{height:100%;background:var(--gd);border-radius:3px;transition:width .5s}
.stat{display:flex;gap:8px;flex-wrap:wrap}
.stat>div{flex:1;min-width:70px;text-align:center;background:var(--s3);border-radius:10px;padding:10px 6px}
.stat span{display:block;font-size:20px;font-weight:800;background:var(--gd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat small{font-size:9px;color:var(--tx2)}
label.opt{display:block;padding:11px 14px;margin:5px 0;background:var(--s3);border-radius:10px;cursor:pointer;border:2px solid transparent;transition:.2s;font-size:13px}
label.opt:hover{border-color:var(--c2)}
label.opt.sel{border-color:var(--c1);background:rgba(108,92,231,.1)}
label.opt input{display:none}
.fb{padding:12px;border-radius:10px;margin:8px 0;font-size:12px;line-height:1.6}
.fb.ok{background:#00b89418;border-left:3px solid var(--c5)}
.fb.no{background:#e1705518;border-left:3px solid var(--c7)}
textarea,input[type=text]{width:100%;padding:10px 12px;border:1px solid #6c5ce733;border-radius:10px;background:var(--s1);color:var(--tx);font-family:var(--f);font-size:13px;resize:vertical}
textarea:focus,input[type=text]:focus{outline:none;border-color:var(--c1)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chip{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;margin:2px;background:var(--s3);color:var(--tx2)}
.chip.on{background:var(--c1);color:#fff}
h2{font-size:17px;font-weight:700;margin:16px 0 8px}
h3{font-size:14px;font-weight:700;color:var(--c2);margin:10px 0 6px}
.sep{height:1px;background:linear-gradient(90deg,transparent,#6c5ce733,transparent);margin:16px 0}
.scroll-x{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.scroll-x::-webkit-scrollbar{height:3px}
.scroll-x>div{min-width:75%;scroll-snap-align:start;flex-shrink:0}
.ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.row{display:flex;align-items:center;gap:10px}
.streak-fire{font-size:28px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeIn .3s}
.fc{perspective:600px;cursor:pointer;height:200px;margin:10px 0}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.fc.flip .fc-inner{transform:rotateY(180deg)}
.fc-f,.fc-b{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;align-items:center;justify-content:center;padding:20px;text-align:center;font-size:14px;line-height:1.6}
.fc-f{background:var(--gd);color:#fff;font-weight:700;font-size:16px}
.fc-b{background:var(--s2);border:1px solid #6c5ce733;transform:rotateY(180deg);flex-direction:column;gap:8px}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--s3);color:var(--tx3);cursor:pointer;transition:.2s}
.day-cell.done{background:var(--c5);color:#fff}
.day-cell.today{border:2px solid var(--c1)}
.day-cell.future{opacity:.4}
@media(max-width:400px){.stat>div{min-width:55px}.stat span{font-size:16px}.hdr h1{font-size:20px}}
</style>
</head>

<script>
// ============ STATE ============
const S={
  page:'dash',
  auditDone:false,auditScore:0,auditAnswers:[],

  fcIdx:0,fcFlip:false,

// ============ STORAGE ============
const LS={
  save(){localStorage.setItem('tbos',JSON.stringify(S))},
  load(){try{const d=JSON.parse(localStorage.getItem('tbos'));if(d)Object.assign(S,d)}catch(e){}},
  exportJSON(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='thinkbig_backup.json';a.click()},
  importJSON(f){const r=new FileReader();r.onload=e=>{try{Object.assign(S,JSON.parse(e.target.result));LS.save();render()}catch(x){alert('File không hợp lệ')}};r.readAsText(f)}
};

commit:'Dán 1 câu khẳng định lên gương phòng tắm',remove:'Bỏ thói quen so sánh mình với người khác trên MXH',

// ============ HELPERS ============
function $(s,p){return(p||document).querySelector(s)}
function $$(s,p){return[...(p||document).querySelectorAll(s)]}
function pct(v,mx){return Math.round(v/mx*100)}
function today(){return new Date().toISOString().slice(0,10)}
function getStreak(){
  if(!S.daysDone.length)return 0;
  // daysDone stores keys like 'd1','d2'...'d30'
  // Calculate streak = highest consecutive from d1 upward
  let s=0;
  for(let i=1;i<=30;i++){if(S.daysDone.includes('d'+i))s++;else break;}
  return s;
}
function focusScore(){
  const a=S.principles_done.length*10;
  const b=S.auditDone?15:0;
  const c=Math.min(S.daysDone.length*2,30);
  const d=S.quizDone?15:0;
  const e=Math.min(getStreak()*3,15);
  const f=S.commitment?10:0;
  const g=S.goals.length?5:0;
  return Math.min(a+b+c+d+e+f+g,100);
}
function finishAudit(){S.auditDone=true;LS.save();render();return rAuditResult();}

// ============ RENDER NAV ============
function renderNav(){
  const n=$('#nav');
  n.innerHTML=NAV_ITEMS.map(i=>`<button onclick="go('${i.id}')" class="${S.page===i.id?'on':''}" id="nb-${i.id}"><svg viewBox="0 0 24 24">${i.icon}</svg>${i.label}</button>`).join('');
}

function go(p){S.page=p;LS.save();render();}

// ============ RENDER MAIN ============
function render(){
  renderNav();
  const a=$('#app');
  switch(S.page){
    case'dash':a.innerHTML=rDash();break;
    case'princ':a.innerHTML=rPrinc();break;
    case'audit':a.innerHTML=rAudit();break;
    case'exc':a.innerHTML=rExc();break;
    case'conf':a.innerHTML=rConf();break;
    case'quiz':a.innerHTML=rQuiz();break;
    case'fc':a.innerHTML=rFC();break;
    case'goal':a.innerHTML=rGoal();break;
    case'leader':a.innerHTML=rLeader();break;
    case'challenge':a.innerHTML=rChallenge();break;
    case'mistakes':a.innerHTML=rMistakes();break;
    case'settings':a.innerHTML=rSettings();break;
    default:a.innerHTML=rDash();
  }
}

function rAudit(){
  if(S.auditDone)return rAuditResult();
  const qi=S.auditAnswers.length;
  if(qi>=AUDIT_Q.length){S.auditDone=true;LS.save();return rAuditResult();}
  const q=AUDIT_Q[qi];
  return`<div class="page"><div class="hdr"><h1>📊 Identity Audit</h1><p>Câu ${qi+1}/${AUDIT_Q.length}</p></div>
  <div class="pbar"><div style="width:${pct(qi,AUDIT_Q.length)}%"></div></div>
  <div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:12px">${q.q}</div>
  ${q.opts.map((o,j)=>`<label class="opt" onclick="answerAudit(${j})"><input type="radio" name="aq">${o}</label>`).join('')}
  </div></div>`;
}
function answerAudit(j){
  const qi=S.auditAnswers.length;
  S.auditAnswers.push(j);
  S.auditScore+=AUDIT_Q[qi].scores[j];
  if(S.auditAnswers.length>=AUDIT_Q.length){S.auditDone=true;}
  LS.save();render();
}

function detectExc(){
  const t=$('#exc-input').value.toLowerCase();
  let type='other',msg='';
  if(/khỏe|bệnh|mệt|đau|yếu/.test(t)){type='health';msg='Bạn đang mắc bệnh viện cớ SỨC KHỎE. Hãy nhớ: "Thà bị mòn còn hơn bị gỉ." Đừng nhắc đến bệnh tật — hãy biết ơn vì còn khỏe mạnh.';}
  else if(/thông minh|ngu|dốt|không giỏi|không đủ|trí tuệ|bằng cấp/.test(t)){type='intelligence';msg='Bạn đang mắc bệnh viện cớ TRÍ TUỆ. Cách bạn sử dụng trí tuệ quan trọng hơn lượng thông minh. Thái độ > IQ.';}
  else if(/già|trẻ|tuổi|muộn|sớm/.test(t)){type='age';msg='Bạn đang mắc bệnh viện cớ TUỔI TÁC. 40 tuổi = mới dùng 40%. Còn 60% sung sức phía trước! Không bao giờ quá muộn.';}
  else if(/may|xui|rủi|số phận|duyên/.test(t)){type='luck';msg='Bạn đang mắc bệnh viện cớ MAY RỦI. Mọi thứ đều có nguyên do. Đừng mong chờ may mắn — hãy TẠO may mắn bằng chuẩn bị + hành động.';}
  else{msg='Hãy đối chiếu với 4 loại excusitis: Sức khỏe, Trí tuệ, Tuổi tác, May rủi. Dù là lý do gì, hãy hỏi: "Người thành công có viện cớ này không?"';}
  const act=type==='other'?'Viết ra 1 hành động cụ thể thay thế lý do này.':'🎯 Hành động ngay: Xóa lý do này và làm 1 bước nhỏ nhất NGAY BÂY GIỜ.';
  $('#exc-result').innerHTML=`<div class="fb ${type!=='other'?'no':'ok'}" style="margin-top:10px"><strong>${type!=='other'?'⚠️ Phát hiện Excusitis!':'🔍 Phân tích'}</strong><br>${msg}<br><br><strong style="color:var(--c5)">${act}</strong></div>`;
}

// ============ CONFIDENCE ============
function rConf(){
  const cs=focusScore();
  return`<div class="page"><div class="hdr"><h1>💪 Confidence Score</h1><p>Điểm tự tin dựa trên hành động thực tế</p></div>
  <div class="card" style="text-align:center"><div style="font-size:48px;font-weight:900;background:var(--gd);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${cs}</div>
  <div class="pbar"><div style="width:${cs}%"></div></div>
  <div style="font-size:12px;color:var(--tx2);margin-top:4px">Điểm tăng khi: thực hành nguyên lý, hoàn thành quiz, duy trì streak, viết cam kết, đặt mục tiêu</div></div>
  <h3>📈 Cách tăng điểm</h3>
  <div class="card" style="font-size:12px;line-height:2">
    ☐ Hoàn thành Audit (+15)<br>☐ Thực hành 9 nguyên lý (+90)<br>☐ Hoàn thành Quiz (+15)<br>☐ Duy trì Streak (+3/ngày, max 15)<br>☐ Viết Cam kết (+10)<br>☐ Đặt Mục tiêu (+5)
  </div>
  <h3>🛡️ 5 Hành Động Xây Tự Tin</h3>
  ${['Ngồi hàng ghế đầu tiên','Giao tiếp bằng mắt','Tăng tốc độ đi bộ 25%','Phát biểu ý kiến','Cười thật tươi'].map((a,i)=>`<div class="card" style="font-size:13px"><span style="color:var(--c1);font-weight:700">${i+1}.</span> ${a}</div>`).join('')}
  </div>`;
}

// ============ QUIZ ============
function rQuiz(){
  if(S.quizDone)return`<div class="page"><div class="hdr"><h1>🧩 Quiz Hoàn Thành!</h1></div>
    <div class="card" style="text-align:center;background:var(--gd);color:#fff;padding:24px"><div style="font-size:42px;font-weight:900">${S.quizScore}/${QUIZ.length}</div><div style="font-size:14px">câu đúng</div></div>
    <button class="btn btn-s" style="width:100%;margin-top:12px" onclick="S.quizIdx=0;S.quizScore=0;S.quizDone=false;S.quizFb=null;LS.save();render()">🔄 Làm lại</button></div>`;
  if(S.quizFb!=null){
    const q=QUIZ[S.quizIdx];const ok=S.quizFb;
    return`<div class="page"><div class="hdr"><h1>🧩 Quiz</h1><p>Câu ${S.quizIdx+1}/${QUIZ.length}</p></div>
    <div class="fb ${ok?'ok':'no'}"><strong>${ok?'✅ Chính xác!':'❌ Chưa đúng!'}</strong><br>${q.fb}${q.aha?'<br><br>💡 <strong>Aha moment:</strong> Đây là khoảnh khắc nhận ra — bạn có đang tự giới hạn mình không?':''}</div>
    <button class="btn btn-p" style="width:100%;margin-top:10px" onclick="nextQuiz()">Tiếp tục →</button></div>`;
  }
  const q=QUIZ[S.quizIdx];
  return`<div class="page"><div class="hdr"><h1>🧩 Quiz Tình Huống</h1><p>Câu ${S.quizIdx+1}/${QUIZ.length}</p></div>
  <div class="pbar"><div style="width:${pct(S.quizIdx,QUIZ.length)}%"></div></div>
  <div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:10px">${q.q}</div>
  ${q.opts.map((o,j)=>`<label class="opt" onclick="answerQuiz(${j})"><input type="radio" name="qq">${o}</label>`).join('')}</div></div>`;
}
function answerQuiz(j){
  const ok=j===QUIZ[S.quizIdx].correct;
  if(ok)S.quizScore++;
  S.quizFb=ok;LS.save();render();
}
function nextQuiz(){
  S.quizFb=null;S.quizIdx++;
  if(S.quizIdx>=QUIZ.length){S.quizDone=true;}
  LS.save();render();
}

// ============ FLASHCARDS ============
function rFC(){
  const fc=FLASHCARDS[S.fcIdx];
  return`<div class="page"><div class="hdr"><h1>🃏 Flashcards</h1><p>${S.fcIdx+1}/${FLASHCARDS.length} — Nhấn để lật</p></div>
  <div class="fc ${S.fcFlip?'flip':''}" onclick="S.fcFlip=!S.fcFlip;render()">
    <div class="fc-inner"><div class="fc-f">${fc.front}</div><div class="fc-b"><div style="font-size:13px">${fc.back}</div></div></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn btn-s" style="flex:1" onclick="S.fcIdx=(S.fcIdx-1+FLASHCARDS.length)%FLASHCARDS.length;S.fcFlip=false;render()">← Trước</button>
    <button class="btn btn-p" style="flex:1" onclick="S.fcIdx=(S.fcIdx+1)%FLASHCARDS.length;S.fcFlip=false;render()">Tiếp →</button>
  </div></div>`;
}

// ============ GOALS ============
function rGoal(){
  return`<div class="page"><div class="hdr"><h1>🎯 Big Goal Visualizer</h1><p>Mục tiêu lớn + Bản dạng mới</p></div>
  <div class="card">
    <h3>👤 Tên / Bản dạng mới</h3>
    <input type="text" id="id-name" value="${S.identity}" placeholder="Tên bạn" onchange="S.identity=this.value;LS.save()">
    <h3 style="margin-top:12px">📜 Tuyên bố cam kết</h3>
    <textarea id="id-commit" rows="2" placeholder="VD: Tôi là người dám nghĩ lớn. Tôi hành động ngay, không viện cớ." onchange="S.commitment=this.value;LS.save()">${S.commitment}</textarea>
    <button class="btn btn-p" style="width:100%;margin-top:8px" onclick="S.identity=$('#id-name').value;S.commitment=$('#id-commit').value;LS.save();render()">💾 Lưu cam kết</button>
  </div>
  <div class="card">
    <h3>🎯 Most Important Target (MIT)</h3>
    <input type="text" id="goal-input" placeholder="VD: Trở thành trưởng phòng trong 2 năm">
    <button class="btn btn-g" style="width:100%;margin-top:8px" onclick="addGoal()">+ Thêm mục tiêu</button>
    ${S.goals.map((g,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px;background:var(--s3);border-radius:8px">
      <span style="flex:1;font-size:13px">🎯 ${g}</span>
      <button style="background:var(--c7);color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer" onclick="S.goals.splice(${i},1);LS.save();render()">✕</button>
    </div>`).join('')}
  </div>
  ${S.commitment?`<div class="card" style="border:2px solid var(--c4)"><h3>🖨 Hợp đồng với chính mình</h3>
  <div style="font-size:12px;line-height:1.8;margin:8px 0;padding:12px;background:var(--s1);border-radius:8px">
    <div style="text-align:center;font-weight:700;font-size:14px;margin-bottom:8px">HỢP ĐỒNG CAM KẾT</div>
    Tôi, <strong>${S.identity||'___'}</strong>, cam kết:<br>
    <em>"${S.commitment}"</em><br><br>
    Mục tiêu: ${S.goals.length?S.goals.map(g=>'• '+g).join('<br>'):'(Chưa đặt)'}<br><br>
    Ngày ký: ${today()}<br>
    <div style="text-align:right;margin-top:12px;font-style:italic">Chữ ký: ____________</div>
  </div>
  <button class="btn btn-s" style="width:100%" onclick="window.print()">🖨 In / Lưu PDF</button></div>`:''}
  </div>`;
}
function addGoal(){const v=$('#goal-input').value.trim();if(v){S.goals.push(v);LS.save();render();}}

// ============ LEADER SIMULATOR ============
function rLeader(){
  const sim=LEADER_SIMS[S.leaderIdx];
  return`<div class="page"><div class="hdr"><h1>👔 Leadership Simulator</h1><p>Tình huống ${S.leaderIdx+1}/${LEADER_SIMS.length}</p></div>
  <div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:10px">📋 ${sim.scene}</div>
  ${S.leaderChoice===null?sim.opts.map((o,j)=>`<label class="opt" onclick="chooseLeader(${j})"><input type="radio" name="lq">${o}</label>`).join(''):
  sim.opts.map((o,j)=>`<div style="padding:8px 12px;margin:4px 0;border-radius:8px;font-size:13px;background:${j===sim.best?'var(--c5)22':j===S.leaderChoice&&j!==sim.best?'var(--c7)22':'var(--s3)'};border-left:3px solid ${j===sim.best?'var(--c5)':j===S.leaderChoice&&j!==sim.best?'var(--c7)':'transparent'}">${j===sim.best?'✅ ':''}${j===S.leaderChoice&&j!==sim.best?'❌ ':''}${o}</div>`).join('')+`<div class="fb ok" style="margin-top:8px">${sim.explain}</div>`}
  </div>
  ${S.leaderChoice!==null?`<button class="btn btn-p" style="width:100%" onclick="S.leaderIdx=(S.leaderIdx+1)%LEADER_SIMS.length;S.leaderChoice=null;LS.save();render()">Tình huống tiếp →</button>`:''}
  </div>`;
}
function chooseLeader(j){S.leaderChoice=j;LS.save();render();}

// ============ 30-DAY CHALLENGE ============
function rChallenge(){
  const sk=getStreak();
  const todayStr=today();
  const startDate=new Date();startDate.setDate(startDate.getDate()-29);
  return`<div class="page"><div class="hdr"><h1>🗓 30-Day Think Big Protocol</h1><p>Mỗi ngày 1 hành động + 1 thói quen loại bỏ</p></div>
  <div class="card" style="text-align:center">
    <div class="streak-fire">🔥</div>
    <div style="font-size:32px;font-weight:900;background:var(--gd);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${sk} ngày</div>
    <div style="font-size:12px;color:var(--tx2)">Streak liên tiếp</div>
    <div class="pbar" style="margin:8px 20px"><div style="width:${pct(S.daysDone.length,30)}%"></div></div>
    <div style="font-size:11px;color:var(--tx2)">${S.daysDone.length}/30 ngày hoàn thành</div>
    <div style="display:flex;justify-content:center;gap:6px;margin-top:8px;flex-wrap:wrap">
      ${[3,7,14,30].map(m=>`<span class="badge" style="background:${S.daysDone.length>=m?'var(--c5)':'var(--s3)'};color:${S.daysDone.length>=m?'#fff':'var(--tx3)'}">${m}🔥</span>`).join('')}
    </div>
  </div>
  <div class="day-grid" style="margin:12px 0">
    ${CHALLENGE_30.map((c,i)=>{
      const d=new Date(startDate);d.setDate(d.getDate()+i);
      const ds=d.toISOString().slice(0,10);
      const done=S.daysDone.includes('d'+(i+1));
      const isToday=ds===todayStr;
      const future=d>new Date();
      return`<div class="day-cell ${done?'done':''} ${isToday?'today':''} ${future&&!isToday?'future':''}" title="Ngày ${i+1}: ${c.act}" onclick="showDay(${i})">${i+1}</div>`;
    }).join('')}
  </div>
  <div id="day-detail"></div>
  </div>`;
}
function showDay(i){
  const c=CHALLENGE_30[i];
  const key='d'+(i+1);
  const done=S.daysDone.includes(key);
  $('#day-detail').innerHTML=`<div class="card" style="border-left:3px solid ${done?'var(--c5)':'var(--c1)'}">
    <div style="font-weight:700;font-size:14px">${done?'✅ ':''} Ngày ${i+1}</div>
    <div style="font-size:12px;color:var(--c5);margin:6px 0">🎯 <strong>Hành động:</strong> ${c.act}</div>
    <div style="font-size:12px;color:var(--c7);margin:6px 0">🗑 <strong>Loại bỏ:</strong> ${c.rm}</div>
    ${!done?`<button class="btn btn-p" style="width:100%;margin-top:8px" onclick="completeDay('${key}')">✅ Hoàn thành ngày ${i+1}</button>`:`<div class="badge" style="margin-top:6px">Đã hoàn thành</div>`}
  </div>`;
}
function completeDay(key){
  if(!S.daysDone.includes(key)){S.daysDone.push(key);S.streak=getStreak();LS.save();render();}
}

// ============ MISTAKES ============
function rMistakes(){
  return`<div class="page"><div class="hdr"><h1>⚠️ 5 Sai Lầm Phổ Biến</h1><p>Khi cố "dám nghĩ lớn" mà thiếu phương pháp</p></div>
  ${MISTAKES.map((m,i)=>`<div class="card" style="border-left:3px solid var(--c7)">
    <div style="font-weight:700;font-size:14px;color:var(--c7)">${i+1}. ${m.title}</div>
    <div style="font-size:12px;color:var(--tx2);margin:4px 0">❌ ${m.desc}</div>
    <div style="font-size:12px;color:var(--c5);margin:4px 0">✅ <strong>Cách sửa:</strong> ${m.fix}</div>
  </div>`).join('')}</div>`;
}

// ============ SETTINGS ============
function rSettings(){
  return`<div class="page"><div class="hdr"><h1>⚙️ Thêm & Cài Đặt</h1></div>
  <h2>📚 Modules khác</h2>
  <div class="grid2">
    <div class="card" onclick="go('exc')" style="cursor:pointer;text-align:center"><div style="font-size:24px">💊</div><div style="font-size:12px;font-weight:700;margin-top:4px">Excusitis</div></div>
    <div class="card" onclick="go('conf')" style="cursor:pointer;text-align:center"><div style="font-size:24px">💪</div><div style="font-size:12px;font-weight:700;margin-top:4px">Tự Tin</div></div>
    <div class="card" onclick="go('fc')" style="cursor:pointer;text-align:center"><div style="font-size:24px">🃏</div><div style="font-size:12px;font-weight:700;margin-top:4px">Flashcards</div></div>
    <div class="card" onclick="go('goal')" style="cursor:pointer;text-align:center"><div style="font-size:24px">🎯</div><div style="font-size:12px;font-weight:700;margin-top:4px">Mục Tiêu</div></div>
    <div class="card" onclick="go('leader')" style="cursor:pointer;text-align:center"><div style="font-size:24px">👔</div><div style="font-size:12px;font-weight:700;margin-top:4px">Lãnh Đạo</div></div>
    <div class="card" onclick="go('mistakes')" style="cursor:pointer;text-align:center"><div style="font-size:24px">⚠️</div><div style="font-size:12px;font-weight:700;margin-top:4px">Sai Lầm</div></div>
  </div>
  <h2>📊 Weekly Review</h2>
  <div class="card">
    <div style="font-size:12px;line-height:2.2">
      1️⃣ Tuần này, điều gì tạo kết quả lớn nhất?<br>
      2️⃣ Điều gì là "excusitis" tuần này?<br>
      3️⃣ Điều gì cần cắt bỏ?<br>
      4️⃣ Tuần tới, 1 MIT là gì?<br>
      5️⃣ Tôi có hành động theo "If-Then" plan không?<br>
      6️⃣ Điểm tự tin tăng hay giảm? Tại sao?<br>
      7️⃣ Tôi có xứng đáng với danh hiệu "Người dám nghĩ lớn" không?
    </div>
    <textarea rows="4" placeholder="Ghi chú review tuần này…" style="margin-top:8px"></textarea>
  </div>
  <h2>💾 Dữ liệu</h2>
  <div class="grid2">
    <button class="btn btn-g" onclick="LS.exportJSON()">📤 Export JSON</button>
    <label class="btn btn-s" style="cursor:pointer">📥 Import<input type="file" accept=".json" style="display:none" onchange="LS.importJSON(this.files[0])"></label>
  </div>
  <button class="btn btn-d" style="width:100%;margin-top:10px" onclick="if(confirm('Xóa tất cả dữ liệu?')){localStorage.removeItem('tbos');location.reload()}">🗑 Xóa dữ liệu</button>
  <div style="text-align:center;margin-top:20px;font-size:10px;color:var(--tx3)">
    Ngô Cương — Think Big Identity OS v4<br>
    Dựa trên "Dám Nghĩ Lớn" — David J. Schwartz<br>
    Offline 100% • Dữ liệu lưu trên thiết bị
  </div></div>`;
}

// ============ THEME ============
function toggleTheme(){
  S.theme=S.theme==='d'?'l':'d';
  document.documentElement.setAttribute('data-t',S.theme==='l'?'l':'');
  LS.save();
}

// ============ INIT ============
LS.load();
if(S.theme==='l')document.documentElement.setAttribute('data-t','l');
S.quizFb=S.quizFb||null;
render();
</script>
</body>
